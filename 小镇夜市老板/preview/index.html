<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小镇夜市老板 - MVP 预览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone">
      <section id="loadingView" class="view loading-view">
        <div>
          <div class="kicker">老街路口</div>
          <h1>小镇夜市老板</h1>
          <p>正在备摊...</p>
        </div>
      </section>

      <section id="avatarSelectView" class="view hidden">
        <section class="topbar">
          <div>
            <div class="kicker">开张前</div>
            <h1>选择老板</h1>
          </div>
        </section>

        <section class="avatar-select-stage">
          <button id="selectMaleAvatarButton" class="avatar-choice" type="button" data-gender="male">
            <img src="../assets/resources/placeholders/avatar/male_boss.svg" alt="男老板" />
            <strong>男老板</strong>
          </button>
          <button id="selectFemaleAvatarButton" class="avatar-choice" type="button" data-gender="female">
            <img src="../assets/resources/placeholders/avatar/female_boss.svg" alt="女老板" />
            <strong>女老板</strong>
          </button>
        </section>
      </section>

      <section id="homeView" class="view home-screen hidden">
        <section class="topbar home-topbar">
          <button
            id="homeTitleButton"
            class="title-lockup"
            type="button"
            aria-controls="homeAdminPanel"
            aria-expanded="false"
          >
            <span class="kicker">老街路口</span>
            <span class="home-title">小镇夜市老板</span>
          </button>
          <button id="homeUpgradeButton" class="street-entry-button" type="button">商业街</button>
        </section>

        <section id="homeAdminPanel" class="admin-panel hidden" aria-label="存档管理">
          <div class="admin-copy">
            <strong>存档管理</strong>
            <span>本地预览工具</span>
          </div>
          <button id="homeLevelOneButton" class="secondary-button" type="button">从第 1 关开始</button>
          <button id="clearSaveButton" class="danger-button" type="button">清除存档</button>
        </section>

        <section class="hud home-hud home-status-strip">
          <div class="meter">
            <span>当前关</span>
            <strong id="homeLevelText">1</strong>
          </div>
          <div class="meter">
            <span>金币</span>
            <strong id="homeCoinText">0</strong>
          </div>
          <div class="meter">
            <span>星级</span>
            <strong id="homeStarText">0</strong>
          </div>
          <div class="meter">
            <span>进度</span>
            <strong id="homeProgressText">0/10</strong>
          </div>
        </section>

        <section class="store-summary">
          <div>
            <span>店铺阶段</span>
            <strong id="homeStoreStageText">Lv.1 破旧推车</strong>
          </div>
          <p id="homeStoreEffectText">基础摊位</p>
          <p id="homeStoreNextText">还差 4 次店铺升级到 Lv.2 亮灯小摊</p>
          <p id="homeStoreHintText" class="store-hint"></p>
        </section>

        <section class="home-stage">
          <div class="lantern-string"></div>
          <div class="street-stalls">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="stall-sign">老街夜市</div>
          <button id="playCurrentButton" class="play-main-button" type="button">进入第 1 关</button>
          <div class="stall-counter">
            <div class="pan"></div>
            <div class="drink-cup"></div>
            <div class="rice-bowl"></div>
          </div>
        </section>

        <section class="home-actions bottom-dock">
          <button id="homeOutfitButton" type="button">装扮</button>
          <button id="homeEquipmentButton" type="button">设备管理</button>
          <button id="homeGrowthButton" type="button">个人成长</button>
          <button id="dailyAdButton" type="button">每日广告奖励</button>
        </section>
      </section>

      <section id="gameView" class="view hidden">
        <section class="topbar">
          <div>
            <div class="kicker">老街路口</div>
            <h1>小镇夜市老板</h1>
          </div>
          <div class="top-actions">
            <button id="businessLogButton" class="small-button secondary-button" type="button">经营</button>
            <button id="gameHomeButton" class="small-button" type="button">首页</button>
            <select id="levelSelect" aria-label="选择关卡"></select>
          </div>
        </section>

        <section class="hud">
          <div class="meter">
            <span>倒计时</span>
            <strong id="timeText">0.0s</strong>
          </div>
          <div class="meter">
            <span>本局金币</span>
            <strong id="coinText">0</strong>
          </div>
          <div class="meter">
            <span>连击</span>
            <strong id="comboText">0</strong>
          </div>
          <div class="meter">
            <span>目标</span>
            <strong id="goalText">-</strong>
          </div>
        </section>

        <section class="street">
          <div class="awning"></div>
          <div id="logBubbleStack" class="log-bubble-stack" aria-live="polite"></div>
          <div id="customerLane" class="customer-lane"></div>
        </section>

        <section class="service">
          <div class="panel stations-panel">
            <div class="panel-title">设备</div>
            <div id="stations" class="stations"></div>
          </div>

          <div class="panel inventory-panel">
            <div class="panel-title">出餐台</div>
            <div id="inventory" class="inventory"></div>
          </div>
        </section>

        <section class="controls">
          <button id="startButton" type="button">开始营业</button>
          <button id="pauseButton" type="button">暂停</button>
          <button id="resetButton" type="button">重开本关</button>
        </section>

        <section id="logOverlay" class="log-overlay hidden" aria-label="全部营业记录">
          <div class="log-dialog">
            <div class="log-dialog-head">
              <div>
                <div class="panel-title">营业记录</div>
                <p>最近 32 条</p>
              </div>
              <button id="closeLogButton" class="small-button" type="button">返回</button>
            </div>
            <div id="logList" class="log-list full-log-list"></div>
          </div>
        </section>
      </section>

      <section id="upgradeView" class="view hidden">
        <section class="topbar">
          <div>
            <div id="upgradeKicker" class="kicker">老街商业街</div>
            <h1 id="upgradeTitle">商业街</h1>
          </div>
          <button id="upgradeBackButton" class="small-button" type="button">返回</button>
        </section>

        <section class="hud home-hud">
          <div id="upgradeCoinMeter" class="meter">
            <span>金币</span>
            <strong id="upgradeCoinText">0</strong>
          </div>
          <div id="upgradeLevelMeter" class="meter">
            <span>当前关</span>
            <strong id="upgradeLevelText">1</strong>
          </div>
        </section>

        <section class="store-summary upgrade-store-summary">
          <div>
            <span>店铺阶段</span>
            <strong id="upgradeStoreStageText">Lv.1 破旧推车</strong>
          </div>
          <p id="upgradeStoreEffectText">基础摊位</p>
          <p id="upgradeStoreNextText">还差 4 次店铺升级到 Lv.2 亮灯小摊</p>
          <p id="upgradeStoreHintText" class="store-hint"></p>
        </section>

        <section id="outfitSection" class="panel avatar-panel hidden">
          <div class="panel-title">角色</div>
          <div class="avatar-row">
            <img id="upgradeAvatarImage" alt="当前老板角色" />
            <div class="avatar-copy">
              <strong id="upgradeAvatarText">男老板</strong>
              <span id="upgradeOutfitText">未装备装扮</span>
            </div>
          </div>
          <div id="outfitList" class="upgrade-list outfit-list"></div>
        </section>

        <section id="marketSection" class="panel upgrade-panel">
          <div class="panel-title">商业街</div>
          <div id="commercialStreet" class="commercial-street">
            <img src="../assets/resources/placeholders/commercial_street.svg" alt="老街商业街" />
            <button class="shop-hotspot outfit-shop" type="button" data-shop-id="outfitShop">装扮铺</button>
            <button class="shop-hotspot appliance-shop" type="button" data-shop-id="applianceShop">电器铺</button>
            <button class="shop-hotspot kitchen-mall" type="button" data-shop-id="kitchenMall">厨具商场</button>
          </div>
        </section>

        <section id="shopSection" class="panel upgrade-panel hidden">
          <div class="shop-interior">
            <button id="streetBackButton" class="small-button" type="button">街道</button>
            <div id="shopFixture" class="shop-fixture wardrobe"></div>
            <button id="shopkeeperButton" class="shopkeeper" type="button">
              <span id="shopkeeperFace" class="shopkeeper-face"></span>
              <span id="shopkeeperBubble" class="shopkeeper-bubble">来看看新货。</span>
            </button>
          </div>
          <div class="shop-shelf-title">
            <strong id="activeShopName">装扮铺</strong>
          </div>
          <div id="shopItemList" class="upgrade-list"></div>
        </section>

        <section id="equipmentManageSection" class="panel upgrade-panel hidden">
          <div class="panel-title">设备管理</div>
          <div id="equipmentManageList" class="upgrade-list"></div>
        </section>

        <section id="personalGrowthSection" class="panel upgrade-panel hidden">
          <div class="panel-title">个人成长</div>
          <div id="personalGrowthList" class="upgrade-list"></div>
        </section>
      </section>

      <section id="resultOverlay" class="result-overlay hidden">
        <div class="result-dialog">
          <div id="resultTitle" class="result-title">结算</div>
          <div id="resultStats" class="result-stats"></div>
          <div class="result-actions">
            <button id="claimButton" type="button">领取金币</button>
            <button id="adDoubleButton" type="button">广告追加金币 mock</button>
            <button id="adExtendButton" type="button">广告续时 +15s mock</button>
            <button id="retryButton" type="button">重玩</button>
            <button id="nextButton" type="button">下一关</button>
            <button id="resultHomeButton" type="button">首页</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./game-preview.js" defer></script>
  </body>
</html>
